# Prometheus configuration for Grid Bot monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'grid-bot'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'grid-bot'
    static_configs:
      - targets: ['grid-bot:8000']  # Assuming bot exposes metrics on port 8000
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
