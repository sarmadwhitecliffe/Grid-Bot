version: '3.8'

services:
  # Grid Trading Bot
  grid-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grid-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    networks:
      - grid-bot-network
    depends_on:
      - redis
      - mongodb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - For caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: grid-bot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - grid-bot-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB - For historical data and trade logs
